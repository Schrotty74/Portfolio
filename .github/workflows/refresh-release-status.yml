name: Refresh portfolio release statuses

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/refresh-release-status.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read latest public releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const repositories = [
            "AppAtlas",
            "FileAtlas",
            "BudgetApp",
            "CalcBoy",
            "UroBilanz",
            "HealthAtlas",
            "chatgpt-pets"
          ];

          async function latestStatus(repository) {
            const response = await fetch(
              `https://api.github.com/repos/Schrotty74/${repository}/releases?per_page=1`,
              {
                headers: {
                  Accept: "application/vnd.github+json",
                  Authorization: `Bearer ${process.env.GH_TOKEN}`,
                  "X-GitHub-Api-Version": "2022-11-28"
                }
              }
            );

            if (!response.ok) {
              throw new Error(`Could not read ${repository}: ${response.status}`);
            }

            const releases = await response.json();
            const release = releases.find(candidate => !candidate.draft);
            if (!release) return null;
            return {
              stage: release.prerelease ? "Beta" : "Final",
              release: release.tag_name,
              updatedAt: release.published_at || release.created_at
            };
          }

          (async () => {
            const entries = await Promise.all(
              repositories.map(async repository => [repository, await latestStatus(repository)])
            );
            const statuses = Object.fromEntries(entries.filter(([, status]) => status));
            fs.writeFileSync("release-status.json", JSON.stringify(statuses, null, 2) + "\n");
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit changed status data
        run: |
          if git diff --quiet -- release-status.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-status.json
          git commit -m "Refresh portfolio release statuses"
          git push
